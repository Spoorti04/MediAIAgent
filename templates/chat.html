<!DOCTYPE html>
<html>
<head>

    <title>MediRAG Chat</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-center mb-4">
        💊 Ask MediRAG
    </h2>

    <form action="/ask" method="POST">

        <textarea
            class="form-control"
            rows="4"
            name="question"
            placeholder="Ask a medical question..."
            required
        ></textarea>

        <button class="btn btn-primary mt-3">

            Ask AI

        </button>

    </form>

    {% if question %}

    <div class="card mt-5">

        <div class="card-body">

            <h5>Your Question</h5>

            <p>{{ question }}</p>

            <hr>

            <h5>AI Answer</h5>

            <p>{{ answer }}</p>

        </div>

    </div>

    {% endif %}

</div>

</body>
</html>
