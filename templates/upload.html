{% extends "base.html" %}

{% block content %}

<div class="card-box">

    <h1>📤 Upload Medical Documents</h1>

    <p>
        Upload trusted medical PDFs to expand the MediRAG knowledge base.
    </p>

</div>

<div class="card-box">

    <form method="POST" enctype="multipart/form-data">

        <div class="mb-3">

            <input
                class="form-control"
                type="file"
                name="pdfs"
                multiple
                accept=".pdf">

        </div>

        <button class="btn btn-primary">

            Upload PDFs

        </button>

    </form>

</div>

{% endblock %}
